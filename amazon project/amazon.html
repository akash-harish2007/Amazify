<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Product Grid</title>
    <link rel="stylesheet" href="amazon.css">
</head>

<body>
    <div class="Exercises-YouTube js-screen">
        <!-- Header -->
        <header class="header">
            <div class="left-section">
                <img class="amazon-logo" src="amazon-logo-white.png" alt="Amazon Logo">
            </div>

            <div class="middle-section">
                <input class="search-bar" id="search-area" type="text" placeholder="Search Amazon">
                <button class="search-button tooltip-container"  onclick="searchbar()">
                    <img  src="search-icon.png" alt="Search">
                    <div class="tooltip">Search</div>
                </button>
            </div>

            <div class="right-section">
                <a class="orders-link" href="cart.html">
                    <span class="returns-text">Returns</span>
                    <span class="orders-text">& Orders</span>
                </a>

                <div class="cart-container tooltip-container"   onclick="window.location.href='cart.html'"> 
                    <img class="cart-icon  js-cart" src="cart-icon.png" alt="Cart">
                    <span class="cart-text">Cart</span>
                    
                    <span class="notification-count  js-count" id="cart-count">0</span>
                    <div class="tooltip">View Cart</div>
                </div>
            </div>
        </header>

        <!-- Product Grid -->
        <main>
            <div class="products-grid js-products-grid"></div>

            <div class="notification-bar  js-notification"></div>

        </main>
            

                
    <!-- JavaScript at the end of body (CORRECT PLACEMENT) -->
    <script  src="amazon.js"></script>
    <script  src="cart.js"></script>

</body>
</html>
