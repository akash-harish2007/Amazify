<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Orders - Amazon</title>
    <link rel="stylesheet" href="amazon.css">
</head>

<body>
    <div class="Exercises-YouTube">
        <!-- Header (copied from amazon.html) -->
        <header class="header">
            <div class="left-section">
                <a href="amazon.html">
                    <img class="amazon-logo" src="amazon-logo-white.png" alt="Amazon Logo">
                </a>
            </div>

            <div class="middle-section">
                <input class="search-bar" type="text" placeholder="Search Amazon">
                <button class="search-button tooltip-container">
                    <img src="search-icon.png" alt="Search">
                    <div class="tooltip">Search</div>
                </button>
            </div>

            <div class="right-section">
                <a class="orders-link" href="orders.html">
                    <span class="returns-text">Returns</span>
                    <span class="orders-text">& Orders</span>
                </a>

                <div class="cart-container tooltip-container">
                    <img class="cart-icon" src="cart-icon.png" alt="Cart">
                    <span class="cart-text">Cart</span>
                    <span class="notification-count" id="cart-count">0</span>
                    <div class="tooltip">View Cart</div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <h1 class="section-title">Your Orders</h1>

            <!-- Orders Container -->
            <div class="orders-container">
                <!-- Order Summary Header - Labels -->
                <div class="order-summary-single">
                    <!-- Row 1: Labels -->
                    <div class="summary-row labels">
                        <span>Order Placed</span>
                        <span>Total</span>
                        <span>Order ID</span>
                    </div>

                    <!-- Row 2: Values -->
                    <div class="summary-row values">
                        <span>March 18, 2024</span>
                        <span>$57.00</span>
                        <span onclick="generateOrderId()">#123-4567890-1234567</span>
                    </div>
                </div>
                <!-- Order Items will be inserted here by JavaScript -->
                <div id="order-items-list"></div>
            </div>


        </main>
    </div>

    <script type = "module" src="amazon.js"></script>
    <script type = "module" src="cart.js"></script>
</body>

</html>
