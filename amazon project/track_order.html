<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Orders - Amazon</title>
    <link rel="stylesheet" href="amazon.css">
</head>

<body>
    <div class="Exercises-YouTube">
        <!-- Header (copied from amazon.html) -->
        <header class="header">
            <div class="left-section">
                <a href="amazon.html">
                    <img class="amazon-logo" src="amazon-logo-white.png" alt="Amazon Logo">
                </a>
            </div>

            <div class="middle-section">
                <input class="search-bar" type="text" placeholder="Search Amazon">
                <button class="search-button tooltip-container">
                    <img src="search-icon.png" alt="Search">
                    <div class="tooltip">Search</div>
                </button>
            </div>

            <div class="right-section">
                <a class="orders-link" href="orders.html">
                    <span class="returns-text">Returns</span>
                    <span class="orders-text">& Orders</span>
                </a>

                <div class="cart-container tooltip-container">
                    <img class="cart-icon" src="cart-icon.png" alt="Cart">
                    <span class="cart-text">Cart</span>
                    <span class="notification-count" id="cart-count">0</span>
                    <div class="tooltip">View Cart</div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div  class="order-stuff">
                <button class="view-orders" onclick="window.location.href='orders.html'">view orders</button>
                <h1 class="section-title">Arriving on Wednesday, March 11</h1>
                <p class="text1">Black and Gray Athletic Cotton Socks - 6 Pairs</p>
                <p class="text2">Quantity: 1</p>
                <img class="item-image" src="athletic-cotton-socks-6-pairs.jpg"
                    alt="Black and Gray Athletic Cotton Socks - 6 Pairs">

                <div class="item-details">
                    <span style="color: rgb(5, 91, 5)">Preparing</span>
                    <span>Shipped</span>
                    <span>Delivered</span>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>




        </main>
