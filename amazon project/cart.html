<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Your Order - Amazon</title>
    <link rel="stylesheet" href="amazon.css">
</head>
<body>
    <div class="Exercises-YouTube">
        <!-- Header (same as before) -->
        <header class="header">
            <div class="left-section" onclick="window.location.href='amazon.html'">
                <img class="amazon-logo" src="images/amazon.png" alt="Amazon Logo">
            </div>

            <div class="middle-section">
                <input class="search-bar" id="search-area" type="text" placeholder="Search Amazify">
                <button class="search-button tooltip-container"  onclick="searchbar()">
                    <img  src="images/cart-icon.png" alt="Search">
                    <div class="tooltip">Search</div>
                </button>
            </div>

            <div class="right-section">
                <a class="orders-link" href="cart.html">
                    <span class="returns-text">Returns</span>
                    <span class="orders-text">& Orders</span>
                </a>

                <div class="cart-container tooltip-container"   onclick="window.location.href='track_order1.html'"> 
                    <img class="cart-icon  js-cart" src="images/cart-icon.png" alt="Cart">
                    <span class="cart-text">Cart</span>
                    
                    <span class="notification-count  js-count" id="cart-count">0</span>
                    <div class="tooltip">View Cart</div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <h1 class="page-title">Review your order</h1>

            <div class="orders-review-container js-cart-items"></div>
        </main>
    </div>

    <script src="cart.js"></script>
 

</body>
</html>
