<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .todo-grid {
            display: grid;
            grid-template-columns: 200px 200px 100px 100px;
            gap: 10px;
            margin-bottom: 10px;
        }

        .todo-item {
            display: grid;
            grid-template-columns: 200px 200px 100px;
            gap: 10px;
            margin-top: 5px;
        }

        button {
            background: green;
            color: white;
            border: none;
            padding: 8px;
            cursor: pointer;
        }

        button:hover {
            background: red;
        }

        .delete-btn {
            background: #c40e0e;
        }
    </style>

</head>

<body>

    <h2>Todo List</h2>

    <div class="todo-grid">

        <input type="text" placeholder="name" id="name">

        <input type="date" placeholder="date" id="date">

        <button onclick="addTodo()">Add</button>

        <button onclick="cleartodos()">Clear All</button>

    </div>

    <div id="list"></div>


    <script>

        const todos = [];


        function addTodo() {

            const name = document.getElementById("name").value;

            const date = document.getElementById("date").value;


            todos.push({

                name: name,

                date: date

            });


            displayTodos();

            if (name === "" || date === "") {

                alert("Please fill in both fields.");

                return;

                todos.push({ name, date });
                displayTodos();



            }

        }

        document.body.addEventListener('keydown', function (event) {
            if (event.key === "a") {
                addTodo();
            }
        }); /* allows the user to add a todo by pressing the Enter key */


        document.body.addEventListener('keydown', function (event) {
            if (event.key === "Escape") {
                cleartodos();
            }
        }); /* allows the user to clear all todos by pressing the Escape key */

        document.querySelectorAll('.delete-btn').forEach(button => {
            button.addEventListener('click', function () {
                todos.splice(index, 1);

                displayTodos();

            });
        }); /* allows the user to delete a todo by clicking the delete button */

        function deleteTodo(index) {

            todos.splice(index, 1);

            displayTodos();

        }

        function cleartodos() {
            todos.length = 0

            displayTodos();
        }


        function displayTodos() {

            const list = document.getElementById("list");

            list.innerHTML = "";

            todos.forEach(function (todo, index) {

                list.innerHTML += `

                    <div class="todo-item">

                        <span>${todo.name}</span>

                        <span>${todo.date}</span>

                        <button onclick="deleteTodo(${index})" class="delete-btn">Delete</button>

                    </div>

                `;

            });
        }

    </script>


</body>

</html>
