<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My First Web Page</title>
    
    <style>
        .js-subscribe-button{
            background-color: black;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .js-subscribe-button:hover{
            background-color: gray;
        }

        .js-subscribe-button.subscribed{
            background-color: red;
            color: white;
        }
    </style>

</head>

<body>
    <button onclick="toggleButton()"class = "js-subscribe-button"> subscribe</button>

   
    <h1>My First Web Page</h1>

    <p>This is a paragraph.</p>

    <script>
         function toggleButton(){

            const button = document.querySelector('.js-subscribe-button');

            button.classList.toggle('subscribed');

            if (button.innerText==='subscribe'){button.innerText = 'subscribed';}
         
         else{button.innerText === 'subscribed'; button.innerText = 'subscribe'; }   

         }
          
    let i=1;

    while (i<=5){console.log(i)
        i++
    }
       

    for (let i=1; i<=5; i++){
        console.log(i)
    } /* recommended to use for loop if there is iterables*/
    </script>

</body>
</html>
