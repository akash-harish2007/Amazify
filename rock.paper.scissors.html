<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <style>
        body {
            background-color: rgb(25, 25, 25);
            color: white;
            font-family: Arial;
        }

        .title {
            font-size: 30px;
            font-weight: bold;
        }

        .move-icon {
            height: 50px;
        }

        .move-button {
            background-color: transparent;
            border: 3px solid white;
            width: 120px;
            height: 120px;
            border-radius: 60px;
            margin-right: 10px;
            cursor: pointer;
        }

        .result {
            font-size: 25px;
            font-weight: bold;
            margin-top: 50px;
        }

        .score {
            margin-top: 60px;
        }

        .reset-score-button,
        .auto-play-button {
            background-color: white;
            border: none;
            font-size: 15px;
            padding: 8px 15px;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
        }

        
    </style>
</head>

<body>
    <p class="title">Rock Paper Scissors</p>

    <button class="move-button js-rock-button">
        <img src="rock-emoji.jpg" class="move-icon" alt="Rock">
    </button>

    <button class="move-button js-paper-button">
        <img src="paper.image.png" class="move-icon" alt="Paper">
    </button>

    <button class="move-button js-scissors-button">
        <img src="scissors.emage.jpg" class="move-icon" alt="Scissors">
    </button>

    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

    <button class="reset-score-button js-reset-score-button">Reset Score</button>
    <button class="auto-play-button js-auto-play-button">Auto Play</button>

    <script>
    let score = JSON.parse(localStorage.getItem('score')) || {
        wins: 0,
        losses: 0,
        ties: 0
    };

    updateScoreElement();

    let isAutoPlaying = false;
    let intervalId;

    function autoPlay() {
        if (!isAutoPlaying) {
            intervalId = setInterval(() => {
                const playerMove = pickComputerMove();
                playGame(playerMove);
            }, 1000);
            isAutoPlaying = true;
            document.querySelector('.js-auto-play-button').innerText = 'Stop Auto Play';
        } else {
            clearInterval(intervalId);
            isAutoPlaying = false;
            document.querySelector('.js-auto-play-button').innerText = 'Auto Play';
        }
    }

    document.querySelector('.js-rock-button')
        .addEventListener('click', () => {
            playGame('rock');
        });

    document.querySelector('.js-paper-button')
        .addEventListener('click', () => {
            playGame('paper');
        });

    document.querySelector('.js-scissors-button')
        .addEventListener('click', () => {
            playGame('scissors');
        });

    document.querySelector('.js-reset-score-button')
        .addEventListener('click', () => {
            score.wins = 0;
            score.losses = 0;
            score.ties = 0;
            localStorage.removeItem('score');
            updateScoreElement();
            document.querySelector('.js-result').innerHTML = '';
            document.querySelector('.js-moves').innerHTML = '';
        });

    document.querySelector('.js-auto-play-button')
        .addEventListener('click', () => {
            autoPlay();
        });

    document.body.addEventListener('keydown', (event) => {
        if (event.key === 'r') {
            playGame('rock');
        } else if (event.key === 'p') {
            playGame('paper');
        } else if (event.key === 's') {
            playGame('scissors');
        } else if (event.key === 'a') {
            autoPlay();
        }
    });

    function playGame(playerMove) {
        const computerMove = pickComputerMove();
        let result = '';

        if (playerMove === 'scissors') {
            if (computerMove === 'rock') {
                result = 'You lose.';
            } else if (computerMove === 'paper') {
                result = 'You win.';
            } else {
                result = 'Tie.';
            }

        } else if (playerMove === 'paper') {
            if (computerMove === 'rock') {
                result = 'You win.';
            } else if (computerMove === 'paper') {
                result = 'Tie.';
            } else {
                result = 'You lose.';
            }

        } else if (playerMove === 'rock') {
            if (computerMove === 'rock') {
                result = 'Tie.';
            } else if (computerMove === 'paper') {
                result = 'You lose.';
            } else {
                result = 'You win.';
            }
        }

        if (result === 'You win.') {
            score.wins += 1;
        } else if (result === 'You lose.') {
            score.losses += 1;
        } else {
            score.ties += 1;
        }

        localStorage.setItem('score', JSON.stringify(score));

        updateScoreElement();

        document.querySelector('.js-result').innerHTML = result;

        // Fix: Use the actual image filenames you have
        let playerImage = '';
        let computerImage = '';
        
        if (playerMove === 'rock') playerImage = 'rock-emoji.jpg';
        else if (playerMove === 'paper') playerImage = 'paper.image.png';
        else if (playerMove === 'scissors') playerImage = 'scissors.emage.jpg';
        
        if (computerMove === 'rock') computerImage = 'rock-emoji.jpg';
        else if (computerMove === 'paper') computerImage = 'paper.image.png';
        else if (computerMove === 'scissors') computerImage = 'scissors.emage.jpg';

        document.querySelector('.js-moves').innerHTML = `
            You
            <img src="${playerImage}" class="move-icon" alt="${playerMove}">
            <img src="${computerImage}" class="move-icon" alt="${computerMove}">
            Computer
        `;
    }

    function updateScoreElement() {
        // Fix: Remove the backslashes
        document.querySelector('.js-score').innerHTML =
            `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
    }

    function pickComputerMove() {
        const randomNumber = Math.random();
        let computerMove = '';

        if (randomNumber < 1/3) {
            computerMove = 'rock';
        } else if (randomNumber < 2/3) {
            computerMove = 'paper';
        } else {
            computerMove = 'scissors';
        }

        return computerMove;
    }
</script>
