<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .todo-grid{
      display: grid;
      grid-template-columns: 200px 200px 110px 110px;
      gap: 10px;
      align-items: center;
      margin-bottom: 15px;
    }

    .todo-grid1{
      display: grid;
      grid-template-columns: 200px 200px 110px;
      gap: 10px;
      align-items: center;
      margin: 6px 0;
    }

    input{
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .button{
      background-color: green;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .button:hover{ background-color: red; }
    .button:active{ background-color: green; }

    .delete-btn{
      background-color: #333;
    }
    .delete-btn:hover{
      background-color: #b00020;
    }

    .header{
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .muted{
      color: #666;
      font-size: 14px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="header">Todo List practice</div>
  <div class="muted">Add a todo + date, each row gets its own Delete button.</div>

  <div class="whole-todo-list">
    <!-- Input row -->
    <div class="todo-grid">
      <input type="text" placeholder="Todo name" class="js-todo-name">
      <input type="date" placeholder="Due date" class="js-todo-date">
      <button class="button js-add-btn">Add todo</button>
      <button class="button js-clear-btn">Clear all</button>
    </div>

    <!-- Todos will be appended here -->
    <div class="js-todo-container"></div>
  </div>

  <script>
    const nameInput = document.querySelector(".js-todo-name");
    const dateInput = document.querySelector(".js-todo-date");
    const addBtn = document.querySelector(".js-add-btn");
    const clearBtn = document.querySelector(".js-clear-btn");
    const todoContainer = document.querySelector(".js-todo-container");

    function addTodo() {
      const todoName = nameInput.value.trim();
      const todoDate = dateInput.value;

      if (!todoName) {
        alert("Please enter a todo name.");
        return;
      }
      if (!todoDate) {
        alert("Please choose a due date.");
        return;
      }

      // Create a new todo row
      const row = document.createElement("div");
      row.classList.add("todo-grid1");

      row.innerHTML = `
        <span>${todoName}</span>
        <span>${todoDate}</span>
        <button class="button delete-btn">Delete</button>
      `;

      // Hook up delete for THIS row only
      row.querySelector(".delete-btn").onclick = () => {
        row.remove();
      };

      // Add row to the container
      todoContainer.appendChild(row);

      // Clear inputs
      nameInput.value = "";
      dateInput.value = "";
      nameInput.focus();
    }

    function clearAll() {
      todoContainer.innerHTML = "";
    }

    // Button events
    addBtn.addEventListener("click", addTodo);
    clearBtn.addEventListener("click", clearAll);

    // Press Enter to add (when typing in name field)
    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addTodo();
    });
  </script>
</body>
</html>
