<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Functions</title>
</head>
<body>
    <button onclick="" class="js-button">Click Me</button>



    <script>
        const button = document.querySelector(".js-button");

        button.addEventListener("click", function greeting(){
            console.log("Hello World");
        });

        button.addEventListener("click1", function(){
            console.log("Hello World");
        });


        button.removeEventListener("click", function greeting(){
            console.log("Hello World");
        }); /* does not work because the function is anonymous and cannot be referenced */

        const eventlistener = () => {
            console.log("Hello World");
        };

        button.addEventListener("click", eventlistener);

        button.removeEventListener("click", eventlistener); /* works because the function is named and can be referenced */

        document.body.addEventListener('keydown', function(event){
            console.log(event.key);
        }); /* logs the key that was pressed */



        document.body.addEventListener('keydown', function(event){
            if(event.key === "Enter"){
                console.log("Enter key was pressed");
            }
        }); /* logs when the Enter key is pressed */

        console.log([1,2,-3].map(function(num){
            return num * 2;
        })); /* maps over the array and returns a new array with the function applied to each element */


        console.log([1,2,-3].filter(function(num){

            if (num > 0) {
                return true;
            } else {
                return false;
            }
            
        })); /* filters the array and returns a new array with only the elements that pass the test */


        console.lo([1,1,3]).map(num => num * 2); /* arrow function version of map */
